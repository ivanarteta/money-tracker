version: '3.8'

services:
  # Base de datos PostgreSQL
  db:
    image: postgres:15-alpine
    container_name: money-tracker-db
    environment:
      POSTGRES_DB: money_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: money-tracker-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: money_tracker
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-key-change-in-production
      JWT_EXPIRES_IN: 7d
      PORT: 3000
      NODE_ENV: development
      EMAIL_HOST: "smtp-relay.brevo.com"
      EMAIL_PORT: 587
      EMAIL_USER: "TU_USUARIO"
      EMAIL_PASSWORD: "TU_SMTP_KEY"
      EMAIL_FROM: "Money Tracker <no-reply@money-tracker.iartetadev.es>"
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: minio
      MINIO_SECRET_KEY: minio123
      MINIO_BUCKET: money-tracker
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "node src/scripts/wait-for-db.js && npm run migrate && npm run dev"

  # Frontend (usa /api para que el proxy de Vite envíe las peticiones al backend)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: money-tracker-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=/api
      - VITE_PROXY_TARGET=http://backend:3000
    depends_on:
      - backend
    command: sh -c "npm install --include=optional --no-audit --no-fund && npm run dev -- --host"

  minio:
    image: minio/minio:latest
    container_name: money-tracker-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"  

volumes:
  postgres_data:
  minio_data: