version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: money-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: money_tracker
      POSTGRES_USER: money_tracker
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U money_tracker"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    image: YOUR_DOCKERHUB_USER/money-tracker-backend:latest
    container_name: money-tracker-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: money_tracker
      DB_USER: money_tracker
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      # Email (Brevo: SMTP & API → usuario = email, contraseña = SMTP Key; puerto 587)
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM}
      # S3 (bucket money-tracker-uploads)
      S3_ENDPOINT: ${S3_ENDPOINT:-s3.amazonaws.com}
      S3_PORT: ${S3_PORT:-443}
      S3_USE_SSL: "true"
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION}
      S3_BUCKET: ${S3_BUCKET:-money-tracker-uploads}
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    command: >
      sh -c "
      node src/scripts/wait-for-db.js &&
      npm run migrate &&
      node src/server.js
      "

  frontend:
    image: YOUR_DOCKERHUB_USER/money-tracker-frontend:latest
    container_name: money-tracker-frontend
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "80"

  proxy:
    image: YOUR_DOCKERHUB_USER/money-tracker-proxy:latest
    container_name: money-tracker-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    depends_on:
      - frontend

  ##minio:
  ##  image: minio/minio:latest
  ##  container_name: money-tracker-minio
  ##  restart: unless-stopped
  ##  environment:
  ##    MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
  ##    MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
  ##  volumes:
  ##    - minio_data:/data
  ##  command: server /data --console-address ":9001"
  ##  expose:
  ##    - "9000"
  ##    - "9001"

  certbot:
    image: certbot/certbot:latest
    container_name: money-tracker-certbot
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    environment:
      - CERTBOT_EMAIL=${CERTBOT_EMAIL}
    command: >
      certonly --webroot -w /var/www/certbot
      --email ${CERTBOT_EMAIL}
      -d money-tracker.iartetadev.es
      --agree-tos --no-eff-email --non-interactive

volumes:
  postgres_data:
  certbot_conf:
  certbot_www:
  #minio_data:
